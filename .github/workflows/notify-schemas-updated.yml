name: Notify schemas updated

# The wire/discovery JSON schemas under docs/public/schemas/
# are canonical in THIS repository, but the MCP server (Cloudflare Worker,
# packages/mcp-middag-ui) lives in the private middag-react-pro repository and
# bundles these schemas at build time. Without a bridge, a schema change here
# would leave the deployed Worker silently stale.
#
# This workflow fires a repository_dispatch to middag-react-pro whenever a
# schema lands on main. The PRO repo's deploy-mcp.yml listens for the
# `schemas-updated` event, overlays the schemas from the source SHA we send,
# and redeploys the Worker.
#
# Auth: GitHub App installation token (no PATs), via the org-level dispatch
# bot app:
#   vars.MIDDAG_DISPATCH_BOT_CLIENT_ID    — the GitHub App's Client ID
#   secrets.MIDDAG_DISPATCH_BOT_PRIVATE_KEY — the App's PEM private key
# The App is installed on middag-io with access to middag-react-pro and holds
# Repository permission "Contents: Read and write" (repository_dispatch
# requires contents write). GITHUB_TOKEN cannot dispatch cross-repo. If the
# var/secret are not visible to this repo, the job no-ops with a notice
# instead of failing.

on:
  push:
    branches: [main]
    paths:
      - "docs/public/schemas/**"
  workflow_dispatch:

jobs:
  dispatch:
    name: repository_dispatch → middag-react-pro
    runs-on: ubuntu-latest
    steps:
      - name: Check App credentials
        id: creds
        env:
          CLIENT_ID: ${{ vars.MIDDAG_DISPATCH_BOT_CLIENT_ID }}
          APP_KEY: ${{ secrets.MIDDAG_DISPATCH_BOT_PRIVATE_KEY }}
        run: |
          if [ -z "${CLIENT_ID}" ] || [ -z "${APP_KEY}" ]; then
            echo "::notice::MIDDAG_DISPATCH_BOT_CLIENT_ID / MIDDAG_DISPATCH_BOT_PRIVATE_KEY not visible to this repo — skipping dispatch (MCP Worker may go stale until they are)."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Mint installation token
        id: app-token
        if: steps.creds.outputs.present == 'true'
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.MIDDAG_DISPATCH_BOT_CLIENT_ID }}
          private-key: ${{ secrets.MIDDAG_DISPATCH_BOT_PRIVATE_KEY }}
          owner: middag-io
          repositories: middag-react-pro

      - name: Fire schemas-updated event
        if: steps.creds.outputs.present == 'true'
        env:
          DISPATCH_TOKEN: ${{ steps.app-token.outputs.token }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          curl -sf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            https://api.github.com/repos/middag-io/middag-react-pro/dispatches \
            -d "{\"event_type\":\"schemas-updated\",\"client_payload\":{\"source_sha\":\"${SHA}\"}}"
          echo "Dispatched schemas-updated (source ${SHA}) to middag-io/middag-react-pro."
