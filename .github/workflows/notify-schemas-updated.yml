name: Notify schemas updated

# D-F2-6 (option b): the wire/discovery JSON schemas under docs/public/schemas/
# are canonical in THIS repository, but the MCP server (Cloudflare Worker,
# packages/mcp-middag-ui) lives in the private middag-react-pro repository and
# bundles these schemas at build time. Without a bridge, a schema change here
# would leave the deployed Worker silently stale.
#
# This workflow fires a repository_dispatch to middag-react-pro whenever a
# schema lands on main. The PRO repo's deploy-mcp.yml listens for the
# `schemas-updated` event and redeploys the Worker.
#
# Auth: GitHub App installation token (no PATs). Requires two secrets on this
# repository (or org-level):
#   SCHEMAS_APP_ID          — the GitHub App's numeric App ID
#   SCHEMAS_APP_PRIVATE_KEY — the App's PEM private key
# The App must be installed on middag-io with access to middag-react-pro and
# hold Repository permission "Contents: Read and write" (repository_dispatch
# requires contents write). GITHUB_TOKEN cannot dispatch cross-repo. Until the
# secrets are provisioned, the job no-ops with a notice instead of failing.

on:
  push:
    branches: [main]
    paths:
      - "docs/public/schemas/**"
  workflow_dispatch:

jobs:
  dispatch:
    name: repository_dispatch → middag-react-pro
    runs-on: ubuntu-latest
    steps:
      - name: Check App credentials
        id: creds
        env:
          APP_ID: ${{ secrets.SCHEMAS_APP_ID }}
          APP_KEY: ${{ secrets.SCHEMAS_APP_PRIVATE_KEY }}
        run: |
          if [ -z "${APP_ID}" ] || [ -z "${APP_KEY}" ]; then
            echo "::notice::SCHEMAS_APP_ID / SCHEMAS_APP_PRIVATE_KEY not provisioned — skipping dispatch (MCP Worker may go stale until they are)."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Mint installation token
        id: app-token
        if: steps.creds.outputs.present == 'true'
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.SCHEMAS_APP_ID }}
          private-key: ${{ secrets.SCHEMAS_APP_PRIVATE_KEY }}
          owner: middag-io
          repositories: middag-react-pro

      - name: Fire schemas-updated event
        if: steps.creds.outputs.present == 'true'
        env:
          DISPATCH_TOKEN: ${{ steps.app-token.outputs.token }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          curl -sf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            https://api.github.com/repos/middag-io/middag-react-pro/dispatches \
            -d "{\"event_type\":\"schemas-updated\",\"client_payload\":{\"source_sha\":\"${SHA}\"}}"
          echo "Dispatched schemas-updated (source ${SHA}) to middag-io/middag-react-pro."
