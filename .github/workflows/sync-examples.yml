name: Sync ReUI Examples

on:
  schedule:
    - cron: '0 8 * * 1' # Every Monday at 8:00 UTC
  workflow_dispatch: # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: npm ci

      - name: Check for new examples
        id: check
        run: |
          npm run sync:examples -- --check && echo "up_to_date=true" >> "$GITHUB_OUTPUT" || echo "up_to_date=false" >> "$GITHUB_OUTPUT"

      - name: Sync examples
        if: steps.check.outputs.up_to_date == 'false'
        run: npm run sync:examples

      - name: Verify build
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          npx tsc --noEmit
          npm run build

      - name: Create PR
        if: steps.check.outputs.up_to_date == 'false'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(examples): sync ReUI examples from registry'
          title: 'chore(examples): sync ReUI examples'
          body: |
            Automated sync of ReUI component examples from the registry.

            Run `npm run sync:examples -- --dry-run` to see details.
          branch: chore/sync-reui-examples
          delete-branch: true
